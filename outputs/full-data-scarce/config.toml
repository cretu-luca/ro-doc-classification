[model]
name = "readerbench/RoBERT-small"
num_labels = 6
max_length = 512

[dataset.moroco]
data_prefix = "./MOROCO/MOROCO/preprocessed/"

[training.full]
batch_size = 16
learning_rate = 2e-5
epochs = 3

[training.lora]
batch_size = 16
learning_rate = 1e-4
epochs = 5
r = 8
lora_alpha = 16
lora_dropout = 0.1
