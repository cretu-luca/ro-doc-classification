[model]
name = "readerbench/RoBERT-small"
num_labels = 6
max_length = 512

[dataset.moroco]
data_prefix = "./MOROCO/MOROCO/preprocessed/"

[dataset.moroco.eval]
gold_prefix = "./MOROCO/MOROCO/Var_Dial_MRC_2019_eval/subtask1/Gold/"
runs_prefix = "./MOROCO/MOROCO/Var_Dial_MRC_2019_eval/subtask1/Runs/"
output_prefix = "./MOROCO/MOROCO/Var_Dial_MRC_2019_eval/subtask1/Eval_Results/"

[training]
batch_size = 16
learning_rate = 2e-5
epochs = 3